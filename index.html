<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنظمة الموحدة</title>
    <!-- استدعاء الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;700&display=swap');

        :root {
            --bg-dark-red: #1a0000; 
            --neon-red: #ef233c;
            --glass: rgba(0, 0, 0, 0.75);
            --border: rgba(239, 35, 60, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Readex Pro', sans-serif; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark-red);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تأثير الوميض الهادئ في الخلفية */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(217, 4, 41, 0.15) 0%, transparent 70%);
            animation: redPulse 5s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes redPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }

        .main-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 55px 45px;
            text-align: center;
            width: 85%;
            max-width: 820px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        h1 {
            color: #fff;
            margin-bottom: 45px;
            font-size: 26px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(239, 35, 60, 0.4);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .btn-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 40px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* حركة الأيقونات (Floating Animation) */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .btn-item i {
            font-size: 42px;
            color: var(--neon-red);
            filter: drop-shadow(0 0 8px var(--neon-red));
            animation: float 3s infinite ease-in-out; /* تطبيق الحركة المستمرة */
        }

        /* تسريع وتغيير الحركة عند الحوم (Hover) */
        .btn-item:hover {
            transform: translateY(-5px);
            background: rgba(239, 35, 60, 0.1);
            border-color: var(--neon-red);
            box-shadow: 0 12px 25px rgba(239, 35, 60, 0.2);
        }

        .btn-item:hover i {
            animation: none; /* إيقاف الحركة العائمة */
            transform: scale(1.2) rotate(5deg); /* حركة تفاعلية قوية */
            transition: 0.3s;
        }

        .btn-item span {
            color: #d1d1d1;
            font-size: 15px;
            font-weight: 600;
        }

        .btn-item:hover span { color: #fff; }

        #site-wrapper {
            position: fixed;
            inset: 0;
            background: #fff;
            display: none;
            z-index: 1000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        #back-btn {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: #d90429;
            color: white;
            padding: 12px 42px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1100;
            display: none;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="main-container" id="mainMenu">
        <h1>روابط ادارية</h1>
        <div class="buttons-grid">
            <div class="btn-item" onclick="openSite('https://melsawaf9193-dotcom.github.io/mo5lfat/')">
                <i class="fas fa-file-contract"></i>
                <span>شوون الهلال الاحمر</span>
            </div>
            
            <div class="btn-item" onclick="openSite('https://red-crescent-boleto.github.io/Administrative-Affairs/')">
                <i class="fas fa-user-shield"></i>
                <span>الشؤون الإدارية</span>
            </div>

            <div class="btn-item" onclick="openSite('https://boleto-reportss.netlify.app/')">
                <i class="fas fa-chart-bar"></i>
                <span>تصحيح التقرير</span>
            </div>
        </div>
    </div>

    <div id="site-wrapper">
    <iframe id="iframeContent" src="" allow="clipboard-read; clipboard-write" allowfullscreen></iframe>
    </div>
    
    <div id="back-btn" onclick="closeSite()">🔙 العودة للرئيسية</div>

    <script>
        function openSite(url) {
            const menu = document.getElementById('mainMenu');
            const wrapper = document.getElementById('site-wrapper');
            const frame = document.getElementById('iframeContent');
            const btn = document.getElementById('back-btn');
            const freshUrl = url + (url.includes('?') ? '&' : '?') + 'rev=' + new Date().getTime();

            frame.src = freshUrl;
            menu.style.display = 'none';
            wrapper.style.display = 'block';
            btn.style.display = 'block';
        }

        function closeSite() {
            const menu = document.getElementById('mainMenu');
            const wrapper = document.getElementById('site-wrapper');
            const frame = document.getElementById('iframeContent');
            const btn = document.getElementById('back-btn');

            frame.src = '';
            menu.style.display = 'block';
            wrapper.style.display = 'none';
            btn.style.display = 'none';
        }
    </script>
</body>
</html>
