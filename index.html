<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنظمة الموحدة</title>
    <!-- استيراد خط Tajawal من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            /* خلفية متدرجة عصرية */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 50px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .links-container {
            display: grid;
            gap: 20px;
        }

        .card-link {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* لمسة جمالية بالألوان الجانبية */
        .card-link::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 5px;
            transition: width 0.3s ease;
        }

        .site-1::before { background: #3498db; }
        .site-2::before { background: #e74c3c; }
        .site-3::before { background: #2ecc71; }

        .card-link:hover::before {
            width: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-left: 15px;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        p.footer-text {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 30px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>روابط ادارية</h1>
    
    <div class="links-container">
        <a href="https://melsawaf9193-dotcom.github.io/mo5lfat/" target="_blank" class="card-link site-1">
            <span class="status-dot"></span>
            شوون الهلال الاحمر
        </a>

        <a href="https://red-crescent-boleto.github.io/Administrative-Affairs/" target="_blank" class="card-link site-2">
            <span class="status-dot"></span>
            الشؤون الإداري
        </a>

        <a href="https://boleto-reportss.netlify.app/" target="_blank" class="card-link site-3">
            <span class="status-dot"></span>
            تصحيح التقرير
        </a>
    </div>

    <p class="footer-text">نظام الوصول الموحد | 2026</p>
</div>

</body>
</html>
