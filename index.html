<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنظمة الموحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* القائمة الرئيسية */
        .main-menu {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            transition: 0.5s;
        }

        h1 { color: #fff; margin-bottom: 30px; font-size: 1.8rem; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 18px;
            margin: 10px 0;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .nav-btn:hover {
            background: rgba(0, 210, 255, 0.2);
            transform: translateY(-3px);
            border-color: #00d2ff;
        }

        /* حاوية الموقع (iFrame) */
        #site-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: none; /* مخفي افتراضياً */
            z-index: 100;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* زر العودة */
        .back-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #00d2ff;
            font-weight: bold;
        }

        .back-bar:hover { background: #00d2ff; color: #000; }

    </style>
</head>
<body>

<!-- الواجهة الرئيسية -->
<div class="main-menu" id="mainMenu">
    <h1>لوحة التحكم الموحدة</h1>
    
    <div class="nav-btn" onclick="openSite('https://melsawaf9193-dotcom.github.io/mo5lfat/')">
        نظام إدارة المخلفات
    </div>

    <div class="nav-btn" onclick="openSite('https://red-crescent-boleto.github.io/Administrative-Affairs/')">
        الشؤون الإدارية
    </div>

    <div class="nav-btn" onclick="openSite('https://boleto-reportss.netlify.app/')">
        منصة التقارير
    </div>
</div>

<!-- حاوية العرض -->
<div id="site-viewer">
    <iframe id="target-frame" src=""></iframe>
</div>

<!-- زر العودة الثابت -->
<div class="back-bar" id="backBtn" onclick="closeSite()">
    ⬅ العودة للرئيسية
</div>

<script>
    function openSite(url) {
        const viewer = document.getElementById('site-viewer');
        const frame = document.getElementById('target-frame');
        const backBtn = document.getElementById('backBtn');
        const mainMenu = document.getElementById('mainMenu');

        frame.src = url;
        viewer.style.display = 'block';
        backBtn.style.display = 'block';
        mainMenu.style.display = 'none';
    }

    function closeSite() {
        const viewer = document.getElementById('site-viewer');
        const frame = document.getElementById('target-frame');
        const backBtn = document.getElementById('backBtn');
        const mainMenu = document.getElementById('mainMenu');

        frame.src = ''; // تفريغ الإطار لتوفير الذاكرة
        viewer.style.display = 'none';
        backBtn.style.display = 'none';
        mainMenu.style.display = 'block';
    }
</script>

</body>
</html>
