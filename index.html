<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنظمة الموحدة</title>
    <!-- خط Tajawal للحصول على مظهر احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* حاوية القائمة الرئيسية */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 50px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .links-container {
            display: grid;
            gap: 20px;
        }

        .card-link {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* نقطة الحالة النابضة */
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-left: 15px;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        /* حاوية عرض المواقع (Iframe) */
        #viewer-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: none;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* زر العودة الذكي */
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #00d2ff;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 2000;
            display: none;
            font-weight: bold;
            border: 2px solid #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #00d2ff;
            color: #000;
        }

    </style>
</head>
<body>

<!-- القائمة الرئيسية -->
<div class="glass-panel" id="mainMenu">
    <h1>روابط ادارية</h1>
    
    <div class="links-container">
        <div class="card-link" onclick="loadSite('https://melsawaf9193-dotcom.github.io/mo5lfat/')">
            <span class="status-dot"></span>
            شوون الهلال الاحمر
        </div>

        <div class="card-link" onclick="loadSite('https://red-crescent-boleto.github.io/Administrative-Affairs/')">
            <span class="status-dot"></span>
            الشؤون الإداريةر
        </div>

        <div class="card-link" onclick="loadSite('https://boleto-reportss.netlify.app/')">
            <span class="status-dot"></span>
            تصحيح التقرير
        </div>
    </div>
</div>

<!-- إطار العرض -->
<div id="viewer-container">
    <iframe id="siteFrame" src=""></iframe>
</div>

<!-- زر العودة -->
<div class="back-btn" id="backBtn" onclick="unloadSite()">
    🔙 العودة للواجهة الأساسية
</div>

<script>
    function loadSite(url) {
        const menu = document.getElementById('mainMenu');
        const viewer = document.getElementById('viewer-container');
        const frame = document.getElementById('siteFrame');
        const btn = document.getElementById('backBtn');

        // تحميل الرابط وإظهار الإطار
        frame.src = url;
        viewer.style.display = 'block';
        btn.style.display = 'block';
        menu.style.opacity = '0'; // إخفاء القائمة بنعومة
    }

    function unloadSite() {
        const menu = document.getElementById('mainMenu');
        const viewer = document.getElementById('viewer-container');
        const frame = document.getElementById('siteFrame');
        const btn = document.getElementById('backBtn');

        // إغلاق الإطار والعودة
        frame.src = '';
        viewer.style.display = 'none';
        btn.style.display = 'none';
        menu.style.opacity = '1';
    }
</script>

</body>
</html>
